name: run-qa
on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-qa.yml'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'pint.json'
      - 'deptrac.yaml'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-qa.yml'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'pint.json'
      - 'deptrac.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        os: [ ubuntu-latest ]
        php: [ 8.4 ]
        laravel: [ 13.* ]
        stability: [ prefer-stable ]

    name: QA - P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan/Larastan)
        run: vendor/bin/phpstan analyse --error-format=github --no-progress

      - name: Architecture (Deptrac)
        run: vendor/bin/deptrac analyse --formatter=json --no-progress
